name: Generate documentation

on:
  workflow_call:
    inputs:
      branch:
        description: 'Branch to grab docs from'
        required: true
        type: string
        default: 'release/midnight'
      docs_branch:
        description: 'Branch to merge with in midnight-docs'
        required: true
        type: string
        default: 'main'
      pr_description:
        description: 'PR description for docs'
        required: true
        type: string
        default: 'Example PR description for midnight-docs'
      draft_pr:
        description: 'Create PR as draft'
        required: false
        type: boolean
        default: false
    secrets:
      MIDNIGHTCI_PACKAGES_READ:
        required: true
      MIDNIGHTCI_PACKAGES_WRITE:
        required: true
      ATTIC_CACHE_TOKEN:
        required: true
      MIDNIGHTCI_REPO:
        required: true

permissions: {}

jobs:
  generate-docs:
    runs-on: ubuntu-latest-16-core-x64
    permissions:
      contents: read
    steps:
      - name: Install Nix
        uses: cachix/install-nix-action@51f3067b56fe8ae331890c77d4e454f6d60615ff # v31.10.2
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-trusted-public-keys = hydra.iohk.io:f/Ea+s+dFdN+3Y/G+FDgSq+a5NEWhJGzdjvKNGv0/EQ=
            extra-substituters = https://cache.iog.io
            accept-flake-config = true

      - name: Cache Nix
        uses: input-output-hk/actions/attic@8663542d03a41382d97ee344a4e3955280db5f95 # latest
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          endpoint: https://attic.ci.iog.io
          cache: midnight-public
          access_token: ${{ secrets.ATTIC_CACHE_TOKEN }}

      - name: Checkout compactc repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.branch }}
          persist-credentials: false

      - name: Setup .npmrc
        run: |
          cd ./runtime
          echo "
          //npm.pkg.github.com/:_authToken=${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}
          @midnight-ntwrk:registry=https://npm.pkg.github.com/
          " > .npmrc

      - name: Configure yarn
        run: |
          cd ./runtime
          yarn config set 'npmScopes.midnight-ntwrk.npmAuthToken' "${{ secrets.MIDNIGHTCI_PACKAGES_WRITE }}"
          echo 'checksumBehavior: update' >> ./.yarnrc.yml

      - name: Build runtime
        run: |
          nix build .#runtime.forPublish

      - name: Generate runtime docs
        run: |
          nix develop --command bash -c "cd ./runtime ; npm run build ; npm run generate-docs"

      - name: Checkout docs repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: "midnightntwrk/midnight-docs"
          token: ${{ secrets.MIDNIGHTCI_REPO }}
          path: "midnight-docs"
          ref: ${{ inputs.docs_branch }}
          persist-credentials: false

      # TEMPORARY: testing check-docs-sync logic. Remove after merging.
      - name: Check verbatim files are in sync
        run: |
          FAILED=0

          check() {
            SRC="$1"
            DST="midnight-docs/$2"
            if ! diff -q "$SRC" "$DST" > /dev/null 2>&1; then
              echo "::error::Out of sync: $SRC vs $DST"
              diff "$SRC" "$DST" || true
              FAILED=1
            else
              echo "OK: $SRC"
            fi
          }

          check doc/ledger-adt.mdx docs/compact/data-types/ledger-adt.mdx
          check doc/ledger-adt.mdx docs/compact/reference/ledger-adt.mdx
          check doc/writing.mdx docs/compact/reference/writing.mdx
          check doc/compact-reference.mdx docs/compact/reference/compact-reference.mdx
          check doc/explicit-disclosure.mdx docs/compact/reference/explicit-disclosure.mdx
          check doc/compact-grammar.mdx docs/compact/reference/compact-grammar.mdx
          check doc/compact-keywords.mdx docs/compact/reference/compact-keywords.mdx
          check doc/api/CompactStandardLibrary/exports.md docs/compact/standard-library/exports.md
          check doc/api/CompactStandardLibrary/README.md docs/compact/standard-library/README.md
          check doc/compiler-usage.mdx docs/compact/compilation-and-tooling/compiler-usage.mdx
          check doc/formatter-usage.mdx docs/compact/compilation-and-tooling/formatter-usage.mdx
          check doc/fixup-usage.mdx docs/compact/compilation-and-tooling/fixup-usage.mdx
          check doc/dev-tool-usage.mdx docs/compact/compilation-and-tooling/dev-tool-usage.mdx

          for SRC_FILE in $(find doc/api/runtime -type f); do
            REL="${SRC_FILE#doc/api/runtime/}"
            if [ "$REL" = "README.md" ]; then
              continue
            fi
            check "$SRC_FILE" "api-reference/compact-runtime/$REL"
          done

          EXPECTED=$(printf "# Compact runtime API\n\n"; cat doc/api/runtime/README.md)
          ACTUAL=$(cat midnight-docs/api-reference/compact-runtime/README.md)
          if [ "$EXPECTED" != "$ACTUAL" ]; then
            echo "::error::Out of sync: doc/api/runtime/README.md vs api-reference/compact-runtime/README.md"
            diff <(echo "$EXPECTED") <(echo "$ACTUAL") || true
            FAILED=1
          else
            echo "OK: doc/api/runtime/README.md (with prepended header)"
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::One or more files are out of sync. Run the generate-docs workflow to update midnight-docs."
            exit 1
          fi

          echo "All verbatim files are in sync."

      - name: Check CSS sync blocks are in sync
        run: |
          python3 scripts/sync-css.py \
            "doc/custom-code.css" \
            "midnight-docs/src/css/custom.css" \
            --check

      - name: Manual Git Push
        env:
          MIDNIGHTCI_REPO: ${{ secrets.MIDNIGHTCI_REPO }}
          RUN_ID: ${{ github.run_id }}
        run: |
          cd midnight-docs
          git config user.name "midnight-ci"
          git config user.email "ci@midnight.network"
          git config --local --unset-all http.https://github.com/.extraheader || true
          git config --global --unset-all http.https://github.com/.extraheader || true
          git config --system --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${MIDNIGHTCI_REPO}@github.com/midnightntwrk/midnight-docs.git"

          git checkout -b "compact-docs-update-${RUN_ID}"

          cp ../doc/ledger-adt.mdx docs/compact/data-types/ledger-adt.mdx
          cp ../doc/ledger-adt.mdx docs/compact/reference/ledger-adt.mdx

          cp ../doc/writing.mdx docs/compact/reference/writing.mdx
          cp ../doc/compact-reference.mdx docs/compact/reference/compact-reference.mdx
          cp ../doc/explicit-disclosure.mdx docs/compact/reference/explicit-disclosure.mdx
          cp ../doc/compact-grammar.mdx docs/compact/reference/compact-grammar.mdx
          cp ../doc/compact-keywords.mdx docs/compact/reference/compact-keywords.mdx

          cp ../doc/api/CompactStandardLibrary/exports.md docs/compact/standard-library/exports.md
          cp ../doc/api/CompactStandardLibrary/README.md docs/compact/standard-library/README.md

          cp ../doc/compiler-usage.mdx docs/compact/compilation-and-tooling/compiler-usage.mdx
          cp ../doc/formatter-usage.mdx docs/compact/compilation-and-tooling/formatter-usage.mdx
          cp ../doc/fixup-usage.mdx docs/compact/compilation-and-tooling/fixup-usage.mdx
          cp ../doc/dev-tool-usage.mdx docs/compact/compilation-and-tooling/dev-tool-usage.mdx

          cp -r ../doc/api/runtime/. ./api-reference/compact-runtime
          echo -e "# Compact runtime API\n\n$(cat ../doc/api/runtime/README.md)" > ./api-reference/compact-runtime/README.md

          python3 ../scripts/sync-css.py "../doc/custom-code.css" "src/css/custom.css"

          git add .
          git commit -m "Update compact documentation"
          git push origin "compact-docs-update-${RUN_ID}"

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.MIDNIGHTCI_REPO }}
          DRAFT_PR: ${{ inputs.draft_pr }}
          DOCS_BRANCH: ${{ inputs.docs_branch }}
          RUN_ID: ${{ github.run_id }}
          PR_DESCRIPTION: ${{ inputs.pr_description }}
        run: |
          DRAFT_FLAG=""
          if [ "$DRAFT_PR" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          gh pr create \
            --repo midnightntwrk/midnight-docs \
            --base "$DOCS_BRANCH" \
            --head "compact-docs-update-${RUN_ID}" \
            --title "$PR_DESCRIPTION" \
            --body "PR: $PR_DESCRIPTION" \
            $DRAFT_FLAG
